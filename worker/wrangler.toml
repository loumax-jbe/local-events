name = "local-events-search"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Both non-secret — this Worker needs no API keys at all (geocoding is a
# free lookup, and events.json is a public file this same site publishes).
[vars]
# Used to set the CORS allow-origin header. Set this to your GitHub Pages
# origin, e.g. "https://your-username.github.io".
ALLOWED_ORIGIN = "https://your-username.github.io"
# The published events.json this Worker searches over, e.g.
# "https://your-username.github.io/local-events/events.json".
EVENTS_JSON_URL = "https://your-username.github.io/local-events/events.json"
