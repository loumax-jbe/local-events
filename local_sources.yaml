# =========================================================
# Local Sources — add a place for the site to search
# =========================================================
# This is the file to edit when you want to add a new library, school,
# venue, or town calendar to the site. Kept separate from config.yaml
# (which holds API keys and search settings) so this stays a simple,
# low-risk file — open it on github.com, paste in an entry, commit.
# Only people with write access to this repo can do that, so it's
# effectively a maintainer-only "add a place" section, no password or
# admin panel needed.
#
# Everything added here flows through the same daily scraper.py run as
# everything else, and shows up in "What's Going On In Our Area" —
# tagged with whatever county you set, so visitors can filter by it.
#
# Two kinds of entries — prefer an ICS calendar feed whenever the site
# has one (see README section 4 for how to find one); fall back to
# custom_html only when it doesn't (see README section 5 for how to find
# the CSS selectors).
#
# `county` is optional on both, but it's what visitors filter by, so a
# venue without one only shows up when no county filter is applied. Set
# it to whatever this venue's county actually is, e.g. "Mercer County, NJ".
#
# For ics_calendars, `event_url_template` is optional too — most ICS
# feeds don't give each event its own URL, so cards fall back to
# `page_url` (a general "browse all events" link) unless you set this.
# Some calendar platforms (Communico/libnet.info, used by many public
# libraries) give every event a real page at a predictable URL even
# though the feed never fills one in — check an event's page on the
# venue's own site for a URL like ".../event/12345" and, if you find
# one, set event_url_template to that same URL with the number replaced
# by "{uid}"; it gets substituted with that event's ICS UID.
#
# -----------------------------------------------------------------
# ics_calendars:
#   - name: "Example Town Library"
#     url: "PASTE_ICS_FEED_URL_HERE"
#     page_url: "https://example.org/events"
#     event_url_template: "https://example.org/event/{uid}"  # optional
#     category: "Library"
#     county: "Example County, NJ"
#
# custom_html:
#   - name: "Example Venue"
#     url: "https://example.org/events"
#     event_selector: ".event-card"
#     title_selector: ".event-card__title"
#     date_selector: ".event-card__date"
#     link_selector: "a"
#     link_attr: "href"
#     scale: "Mid-size"
#     county: "Example County, NJ"
# -----------------------------------------------------------------

ics_calendars: []

custom_html: []
